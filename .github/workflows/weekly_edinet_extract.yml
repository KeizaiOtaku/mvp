name: Weekly EDINET priority CSV
"on":
  workflow_dispatch:
    inputs:
      days:
        description: "取得対象日数"
        required: false
        default: "7"
      end_offset_days:
        description: "終了日のオフセット。1なら昨日まで、0なら今日まで"
        required: false
        default: "1"
      max_docs:
        description: "最大処理件数。20ならテスト、0なら全件"
        required: false
        default: "20"
      max_chars:
        description: "抽出テキスト最大文字数"
        required: false
        default: "8000"
      sleep_sec:
        description: "EDINET APIアクセス間隔 秒"
        required: false
        default: "0.2"

  schedule:
    - cron: "30 15 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect app directory
        id: detect
        shell: bash
        run: |
          if [ -f "collect_weekly.py" ]; then
            echo "base=." >> "$GITHUB_OUTPUT"
          elif [ -f "mvp/collect_weekly.py" ]; then
            echo "base=mvp" >> "$GITHUB_OUTPUT"
          else
            echo "collect_weekly.py not found in root or mvp/"
            echo "--- files ---"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Show files before run
        run: |
          echo "Base dir: ${{ steps.detect.outputs.base }}"
          find . -maxdepth 3 -type f | sort
          echo "--- data before ---"
          ls -la "${{ steps.detect.outputs.base }}/data" || true

      - name: Check EDINET API key
        run: |
          if [ -z "${{ secrets.EDINET_API_KEY }}" ]; then
            echo "EDINET_API_KEY is not set."
            exit 1
          fi
          echo "EDINET_API_KEY is set."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.detect.outputs.base }}/requirements.txt"

      - name: Ensure data directory exists
        run: |
          mkdir -p "${{ steps.detect.outputs.base }}/data"

      - name: Run EDINET extraction
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          python "${{ steps.detect.outputs.base }}/collect_weekly.py" \
            --days 7 \
            --end-offset-days 1 \
            --max-docs 20 \
            --max-chars 8000 \
            --sleep-sec 0.2 \
            --data-dir "${{ steps.detect.outputs.base }}/data"

      - name: Show generated files
        run: |
          echo "--- generated data ---"
          ls -la "${{ steps.detect.outputs.base }}/data" || true
          echo "--- csv/json files ---"
          find "${{ steps.detect.outputs.base }}/data" -type f | sort

      - name: Fail if CSV was not generated
        run: |
          if ! ls "${{ steps.detect.outputs.base }}/data"/*.csv 1> /dev/null 2>&1; then
            echo "No CSV files found."
            echo "EDINET extraction did not generate CSV."
            exit 1
          fi

      - name: Commit generated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.detect.outputs.base }}/data"

          if git diff --staged --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Update EDINET priority CSV"
            git push
          fi

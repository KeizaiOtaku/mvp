name: Weekly EDINET priority CSV

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * 0"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create dummy CSV
        run: |
          mkdir -p data
          echo "created_at,message" > data/debug_test.csv
          echo "$(date -u),GitHub Actions can create CSV" >> data/debug_test.csv
          ls -la data

      - name: Commit dummy CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/debug_test.csv

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add debug CSV"
            git push
          fi

name: Weekly EDINET priority CSV

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * 0"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la

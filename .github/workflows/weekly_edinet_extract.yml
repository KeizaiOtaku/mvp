name: Weekly EDINET priority CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * 0"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mvp/requirements.txt

      - name: Run EDINET weekly collector
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          python mvp/collect_weekly.py

      - name: Commit generated CSV files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mvp/data || true
          git diff --cached --quiet || git commit -m "Update weekly EDINET CSV"
          git push

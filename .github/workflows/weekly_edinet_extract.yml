name: Weekly EDINET priority CSV

"on":
  workflow_dispatch:
    inputs:
      days:
        description: "取得対象日数"
        required: false
        default: "7"
      end_offset_days:
        description: "終了日のオフセット。1なら昨日まで、0なら今日まで"
        required: false
        default: "1"
      max_docs:
        description: "最大処理件数。20ならテスト、0なら全件"
        required: false
        default: "20"
      max_chars:
        description: "抽出テキスト最大文字数"
        required: false
        default: "8000"
      sleep_sec:
        description: "EDINET APIアクセス間隔 秒"
        required: false
        default: "0.2"

  schedule:
    - cron: "30 15 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          find . -maxdepth 4 -type f | sort

      - name: Check EDINET API key
        run: |
          if [ -z "${{ secrets.EDINET_API_KEY }}" ]; then
            echo "EDINET_API_KEY is not set."
            exit 1
          fi
          echo "EDINET_API_KEY is set."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: |
          mkdir -p data

      - name: Run EDINET extraction
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          python collect_weekly.py \
            --days ${{ github.event.inputs.days || '7' }} \
            --end-offset-days ${{ github.event.inputs.end_offset_days || '1' }} \
            --max-docs ${{ github.event.inputs.max_docs || '20' }} \
            --max-chars ${{ github.event.inputs.max_chars || '8000' }} \
            --sleep-sec ${{ github.event.inputs.sleep_sec || '0.2' }} \
            --data-dir data

      - name: Show generated files
        run: |
          echo "--- data ---"
          ls -la data || true
          echo "--- csv/json ---"
          find data -type f | sort

      - name: Fail if latest CSV was not generated
        run: |
          if [ ! -f "data/edinet_priority_sections_latest.csv" ]; then
            echo "data/edinet_priority_sections_latest.csv was not generated."
            exit 1
          fi

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data

          if git diff --staged --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Update EDINET priority CSV"
            git push
          fi
